# 服务配置
server:
  port: 2333
  servlet:
    # 请求前缀
    contextPath: /api/v2
  web:
    cors:
      allowed-origin-patterns: "*"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

# 数据源配置
spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/mrecord.db
    type: com.alibaba.druid.pool.DruidDataSource
    # Druid 连接池配置
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 1
      max-wait: 6000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      validation-query: "SELECT 1"
      connection-init-sqls:
        - "PRAGMA journal_mode=WAL"
        - "PRAGMA foreign_keys=ON"
        - "PRAGMA busy_timeout=5000"
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# MyBatis-Flex配置
mybatis-flex:
  type-handlers-package: com.dcz.mrecord.config

# 日志配置
logging:
  level:
    root: info
    com.mrecord: debug
    com.mybatis-flex: warn
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 月衡配置项
mr:
  # 这里需要自行填写jwt生成密钥，确定后不要修改，否则会导致所有登录失败
  jwtSecret:
  # jwt过期时间，默认7天(7 * 24 * 60 * 60 * 1000)
  jwtExpire: 604800000
  # 重置密码令牌生成密钥，确定后不要修改，否则会导致15分钟前的找回密码链接失效
  resetPwdTokenSecret:
  # 账户激活令牌生成密钥，确定后不要修改，否则会导致24小时前的激活链接失效
  activateTokenSecret: