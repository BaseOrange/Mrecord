# 服务配置
server:
  port: 2333
  servlet:
    # 请求前缀
    contextPath: /api/v2
  web:
    cors:
      allowed-origin-patterns: "*"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

# 数据源配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mrecord?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    type: com.alibaba.druid.pool.DruidDataSource
    # Druid 连接池配置
    druid:
      initial-size: 3
      min-idle: 3
      max-active: 10
      max-wait: 6000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true

# 日志配置
logging:
  level:
    root: info
    com.mrecord: debug
    com.mybatis-flex: warn
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 月衡配置项
mr:
  # 这里需要自行填写jwt生成密钥，确定后不要修改，否则会导致所有登录失败
  jwtSecret:
  # jwt过期时间，默认7天(7 * 24 * 60 * 60 * 1000)
  jwtExpire: 604800000
  # 重置密码令牌生成密钥，确定后不要修改，否则会导致15分钟前的找回密码链接失效
  resetPwdTokenSecret: